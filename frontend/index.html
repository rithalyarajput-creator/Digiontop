<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigionTop — Digital Marketing Agency India | SEO, Web Design & E-Commerce</title>
    <meta name="description" content="DigionTop is India's remote-first digital marketing agency offering website development, SEO, social media marketing, PPC ads, and e-commerce solutions. We put your brand on top." />
    <meta name="keywords" content="DigionTop, digital marketing agency India, SEO services, website development, social media marketing, PPC, Google Ads, e-commerce, Shopify, branding, content marketing" />
    <meta name="author" content="DigionTop" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://digiontop.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DigionTop" />
    <meta property="og:title" content="DigionTop — Digital Marketing Agency India" />
    <meta property="og:description" content="We put your brand on top. Website development, SEO, social media, PPC ads & e-commerce — one full-service digital agency." />
    <meta property="og:url" content="https://digiontop.com/" />
    <meta property="og:image" content="https://digiontop.com/images/home-banner.webp" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DigionTop — Digital Marketing Agency India" />
    <meta name="twitter:description" content="We put your brand on top. SEO, web development, social media, PPC & e-commerce." />
    <meta name="twitter:image" content="https://digiontop.com/images/home-banner.webp" />
    <meta name="twitter:site" content="@digiontopagency" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured data: Organization (helps Google show your brand + logo) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DigionTop",
      "alternateName": "DigionTop Agency",
      "url": "https://digiontop.com",
      "logo": "https://digiontop.com/images/logo-header.webp",
      "description": "India's remote-first digital marketing agency — SEO, web development, social media, PPC and e-commerce solutions.",
      "email": "digiontop.agency@gmail.com",
      "telephone": "+91-9217594664",
      "sameAs": ["https://x.com/digiontopagency"],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-9217594664",
        "contactType": "customer service",
        "areaServed": "IN",
        "availableLanguage": ["English", "Hindi"]
      }
    }
    </script>

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DigionTop",
      "url": "https://digiontop.com"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
