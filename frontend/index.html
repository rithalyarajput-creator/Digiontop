<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon: PNGs prioritized for better display -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=4" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=4" />
    <link rel="icon" type="image/png" sizes="any" href="/favicon.png?v=4" />
    <link rel="apple-touch-icon" href="/favicon-192.png?v=4" />
    <meta name="theme-color" content="#F5A800" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigionTop — #1 Digital Marketing Agency in India</title>
    <!-- Per-page title/description/OG/Twitter are managed by react-helmet-async (see components/Seo.jsx).
         Only keep tags here that don't change per page. -->
    <meta name="keywords" content="DigionTop, digital marketing agency India, SEO services, website development, social media marketing, PPC, Google Ads, e-commerce, Shopify, branding, content marketing" />
    <meta name="author" content="DigionTop" />
    <meta name="robots" content="index, follow" />
    <meta name="twitter:site" content="@digiontopagency" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured data: Organization (helps Google show your brand + logo) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DigionTop",
      "alternateName": "DigionTop Agency",
      "url": "https://digiontop.com",
      "logo": "https://digiontop.com/images/logo-header.webp",
      "description": "India's remote-first digital marketing agency — SEO, web development, social media, PPC and e-commerce solutions.",
      "email": "digiontop.agency@gmail.com",
      "telephone": "+91-9217594664",
      "sameAs": ["https://x.com/digiontopagency"],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-9217594664",
        "contactType": "customer service",
        "areaServed": "IN",
        "availableLanguage": ["English", "Hindi"]
      }
    }
    </script>

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DigionTop",
      "url": "https://digiontop.com"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
